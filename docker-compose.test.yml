services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartreview_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 15

  minio-test:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db-test:5432/smartreview_test?schema=public"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "test-secret-for-e2e-tests-at-least-32-chars!!"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
      SMTP_HOST: "localhost"
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: "noreply@smartreview.ru"
      NODE_ENV: "test"
      S3_ENDPOINT: "http://minio-test:9000"
      S3_BUCKET: "qrwin-test"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
    depends_on:
      db-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/auth/csrf || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  e2e:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    environment:
      BASE_URL: "http://app:3000"
    depends_on:
      app:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
