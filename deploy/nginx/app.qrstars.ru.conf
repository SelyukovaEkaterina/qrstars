upstream qrstars_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=reviews:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
# Scan pages: many guests at one location hit the same QR simultaneously
limit_req_zone $binary_remote_addr zone=scan:10m rate=30r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name app.qrstars.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.qrstars.ru;

    ssl_certificate /etc/letsencrypt/live/app.qrstars.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.qrstars.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 32m;

    # Proxy S3 uploads (same-origin → no CORS issues with canvas)
    location /storage/ {
        proxy_pass https://s3.ru1.storage.beget.cloud/1919a3d97e3e-qrstarsru/;
        proxy_set_header Host s3.ru1.storage.beget.cloud;
        proxy_ssl_server_name on;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Защита auth-эндпоинтов (регистрация, логин, сброс пароля)
    location ~ ^/api/auth/(register|forgot-password|reset-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://qrstars_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Защита публичных отзывов и визиток
    location ~ ^/api/(reviews|business-cards/contact) {
        limit_req zone=reviews burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://qrstars_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # QR scan pages: higher burst to handle restaurant lunch-rush spikes
    location ~ ^/(q|scan)/ {
        limit_req zone=scan burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://qrstars_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=general burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://qrstars_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
