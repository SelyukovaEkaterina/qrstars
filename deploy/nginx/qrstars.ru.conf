# Static site from Beget S3 website bucket (path-style)
map $uri $website_uri {
    default $uri;
    ~^/$ /index.html;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name qrstars.ru www.qrstars.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name qrstars.ru www.qrstars.ru;

    ssl_certificate /etc/letsencrypt/live/qrstars.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qrstars.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location /q/ {
        proxy_pass https://app.qrstars.ru;
        proxy_set_header Host app.qrstars.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass https://s3.ru1.storage.beget.cloud/1919a3d97e3e-website$website_uri;
        proxy_set_header Host s3.ru1.storage.beget.cloud;
        proxy_ssl_server_name on;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
        proxy_intercept_errors on;
        error_page 404 = /__fetch_index;
    }

    location = /__fetch_index {
        internal;
        proxy_pass https://s3.ru1.storage.beget.cloud/1919a3d97e3e-website/index.html;
        proxy_set_header Host s3.ru1.storage.beget.cloud;
        proxy_ssl_server_name on;
    }
}
